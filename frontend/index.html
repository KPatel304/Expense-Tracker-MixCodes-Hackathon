<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/vendor/chart.umd.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">💸 Expense Tracker</span>
      <span id="current-month-label"></span>
    </div>
  </header>

  <main>
    <!-- Summary cards -->
    <section class="summary-cards" id="summary-cards">
      <div class="card">
        <div class="card-label">Monthly Total</div>
        <div class="card-value" id="monthly-total">$0.00</div>
      </div>
      <div class="card">
        <div class="card-label">All-Time Total</div>
        <div class="card-value" id="alltime-total">$0.00</div>
      </div>
      <div class="card">
        <div class="card-label">Total Expenses</div>
        <div class="card-value" id="total-count">0</div>
      </div>
    </section>

    <div class="content-grid">
      <!-- Add Expense Form -->
      <section class="panel" id="add-panel">
        <h2>Add Expense</h2>
        <form id="expense-form">
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" name="amount" min="0.01" step="0.01" placeholder="0.00" required />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>Select a category</option>
            </select>
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="What did you spend on?" required />
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required />
          </div>
          <button type="submit" class="btn-primary">Add Expense</button>
          <p class="form-error" id="form-error"></p>
        </form>
      </section>

      <!-- Charts -->
      <section class="panel" id="charts-panel">
        <h2>Spending Overview</h2>
        <div class="chart-tabs">
          <button class="tab-btn active" data-tab="category">By Category</button>
          <button class="tab-btn" data-tab="monthly">Monthly Trend</button>
        </div>
        <div class="chart-container" id="chart-category">
          <canvas id="categoryChart"></canvas>
          <p class="no-data" id="category-no-data">No expense data yet.</p>
        </div>
        <div class="chart-container hidden" id="chart-monthly">
          <canvas id="monthlyChart"></canvas>
          <p class="no-data" id="monthly-no-data">No expense data yet.</p>
        </div>
      </section>
    </div>

    <!-- Expense List -->
    <section class="panel" id="list-panel">
      <div class="list-header">
        <h2>Expense History</h2>
        <div class="list-filters">
          <select id="filter-category">
            <option value="">All Categories</option>
          </select>
          <input type="month" id="filter-month" />
          <button class="btn-secondary" id="clear-filters">Clear</button>
        </div>
      </div>
      <div id="expense-list">
        <p class="empty-state">No expenses found. Add your first expense above!</p>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
